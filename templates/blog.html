{% extends "base.html" %}

{% block content %}
<br>
<h1 class="title text-rose-600 text-xl font-bold italic">
  {{ section.title }}
</h1>
<ul class="text-rose-600">
  {% for page in section.pages %}
  <br>
  <li class="text-rose-600">
    <a class="text-rose-600" href="{{ page.permalink | safe }}">{{ page.title }}</a>
    <br>
    <a class="text-rose-600" href="{{ page.permalink | safe }}">[ {{ page.date }} ]</a>
  </li>
  {% endfor %}
</ul>
{% endblock content %}
